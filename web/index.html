  <script>
    (function ensureFormFieldIdentity() {
      let generatedFieldCount = 0;

      function assignIdentityAttributes(root) {
        const fields = root.querySelectorAll('input, textarea, select');
        for (const field of fields) {
          if (!field.id) {
            generatedFieldCount += 1;
            field.id = `cs-field-${generatedFieldCount}`;
          }
          if (!field.name) {
            field.name = field.id;
          }
        }
      }

      assignIdentityAttributes(document);

      const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          for (const node of mutation.addedNodes) {
            if (!(node instanceof Element)) {
              continue;
            }
            if (node.matches('input, textarea, select')) {
              assignIdentityAttributes(node.parentElement ?? document);
            } else {
              assignIdentityAttributes(node);
            }
          }
        }
      });

      observer.observe(document.documentElement, {
        childList: true,
        subtree: true,
      });
    })();
  </script>
