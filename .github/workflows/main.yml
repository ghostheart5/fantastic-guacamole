name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Validate required deploy secrets
        run: |
          if [ -z "${{ secrets.CHRONOSPARK_SUPABASE_URL }}" ] || [ -z "${{ secrets.CHRONOSPARK_SUPABASE_ANON_KEY }}" ]; then
            echo "::warning::Missing repository secrets: CHRONOSPARK_SUPABASE_URL and/or CHRONOSPARK_SUPABASE_ANON_KEY. Supabase features will be unavailable in this build."
          fi

      - name: Ensure CI .env asset exists
        run: |
          cat > .env << 'EOF'
          CHRONOSPARK_SUPABASE_URL=${{ secrets.CHRONOSPARK_SUPABASE_URL }}
          CHRONOSPARK_SUPABASE_ANON_KEY=${{ secrets.CHRONOSPARK_SUPABASE_ANON_KEY }}
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Run security secret guard
        shell: pwsh
        run: ./scripts/security_secret_guard.ps1

      - name: Build web
        run: |
          flutter build web --release --csp --no-wasm-dry-run --base-href /fantastic-guacamole/ \
            --dart-define=CHRONOSPARK_SUPABASE_URL=${{ secrets.CHRONOSPARK_SUPABASE_URL }} \
            --dart-define=CHRONOSPARK_SUPABASE_ANON_KEY=${{ secrets.CHRONOSPARK_SUPABASE_ANON_KEY }}

      - name: Verify no unsafe string-eval patterns in built JS
        run: |
          if grep -R --line-number -E "eval\(|new Function\(|setTimeout\(['\"]|setInterval\(['\"]" build/web --include='*.js'; then
            echo "Unsafe string-evaluation pattern found in build output."
            exit 1
          fi

      - name: Copy legal and static pages to build
        run: |
          mkdir -p build/web/privacy build/web/privacy-policy build/web/terms build/web/terms-of-service build/web/support build/web/delete-account build/web/code-of-conduct build/web/license build/web/security-policy build/web/readme
          cp styles.css build/web/styles.css
          cp about.html build/web/about.html
          cp CHRONOSPARK.html build/web/CHRONOSPARK.html
          cp contact.html build/web/contact.html
          cp download.html build/web/download.html
          cp testers.html build/web/testers.html
          cp privacy.html build/web/privacy.html
          cp terms.html build/web/terms.html
          cp support.html build/web/support.html
          cp privacy/index.html build/web/privacy/index.html
          cp privacy-policy/index.html build/web/privacy-policy/index.html
          cp terms/index.html build/web/terms/index.html
          cp terms-of-service/index.html build/web/terms-of-service/index.html
          cp support/index.html build/web/support/index.html
          cp assets/legal/delete_account.html build/web/delete-account/index.html
          cp assets/legal/code_of_conduct.html build/web/code-of-conduct/index.html
          cp assets/legal/license.html build/web/license/index.html
          cp assets/legal/security_policy.html build/web/security-policy/index.html
          cp assets/legal/readme.html build/web/readme/index.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
