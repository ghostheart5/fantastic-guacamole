name: ChronoSpark Linux Tester Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package artifacts
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          TAG="linux-tester-${TIMESTAMP}"
          ARCHIVE_BASE="chronospark-linux-x64-${TIMESTAMP}"
          BUNDLE_DIR="build/linux/x64/release/bundle"

          mkdir -p dist

          # Create tar.gz
          tar -czf "dist/${ARCHIVE_BASE}.tar.gz" -C "$(dirname "${BUNDLE_DIR}")" bundle

          # Create zip
          (cd "$(dirname "${BUNDLE_DIR}")" && zip -r "${GITHUB_WORKSPACE}/dist/${ARCHIVE_BASE}.zip" bundle)

          # Generate per-timestamp SHA256SUMS
          (cd dist && sha256sum "${ARCHIVE_BASE}.tar.gz" "${ARCHIVE_BASE}.zip" > "SHA256SUMS-${TIMESTAMP}.txt")

          # Generate rolling SHA256SUMS
          cp "dist/SHA256SUMS-${TIMESTAMP}.txt" dist/SHA256SUMS.txt

          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "ARCHIVE_BASE=${ARCHIVE_BASE}" >> "$GITHUB_ENV"
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "ChronoSpark Linux Tester Release" \
            --draft \
            --prerelease \
            --notes "Automated Linux tester build (${TIMESTAMP})" \
            "dist/${ARCHIVE_BASE}.tar.gz" \
            "dist/${ARCHIVE_BASE}.zip" \
            "dist/SHA256SUMS-${TIMESTAMP}.txt" \
            "dist/SHA256SUMS.txt"
