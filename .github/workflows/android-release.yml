name: Android Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-aab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run security secret guard
        shell: pwsh
        run: ./scripts/security_secret_guard.ps1

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ ! -s android/app/key.jks ]; then
            echo "::error::Decoded keystore is missing or empty. Check ANDROID_KEYSTORE_BASE64."
            exit 1
          fi
          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::ANDROID_STORE_PASSWORD and ANDROID_KEY_PASSWORD are required."
            exit 1
          fi
          RESOLVED_ALIAS="$KEY_ALIAS"
          if [ -z "$RESOLVED_ALIAS" ]; then
            RESOLVED_ALIAS=$(keytool -list -keystore android/app/key.jks -storepass "$STORE_PASSWORD" 2>/dev/null | awk -F, 'NR > 1 {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); if ($1 != "") {print $1; exit}}')
          fi
          if [ -z "$RESOLVED_ALIAS" ]; then
            echo "::error::Unable to resolve keystore alias. Set ANDROID_KEY_ALIAS secret."
            exit 1
          fi
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$RESOLVED_ALIAS
          storeFile=app/key.jks
          EOF
          echo "Using keystore alias: $RESOLVED_ALIAS"

      - name: Verify upload key fingerprint
        env:
          EXPECTED_UPLOAD_SHA1: "13:60:98:6B:E3:45:4F:75:52:56:2E:9A:97:CE:CE:37:74:E2:FD:46"
        run: |
          ACTUAL_SHA1=$(keytool -list -v -keystore android/app/key.jks -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" -alias "$(awk -F= '$1=="keyAlias" {print $2}' android/key.properties)" 2>/dev/null | awk -F': ' '/SHA1:/{print $2; exit}')
          if [ -z "$ACTUAL_SHA1" ]; then
            echo "::error::Unable to read upload key SHA1 fingerprint from android/app/key.jks"
            exit 1
          fi
          echo "Resolved upload key SHA1: $ACTUAL_SHA1"
          if [ "$ACTUAL_SHA1" != "$EXPECTED_UPLOAD_SHA1" ]; then
            echo "::error::Upload key SHA1 mismatch. Expected $EXPECTED_UPLOAD_SHA1 but found $ACTUAL_SHA1"
            exit 1
          fi

      - name: Configure optional Firebase Android file
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json
            echo "Configured android/app/google-services.json from ANDROID_GOOGLE_SERVICES_JSON_BASE64."
          elif [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "Configured android/app/google-services.json from ANDROID_GOOGLE_SERVICES_JSON."
          else
            echo "::error::ANDROID_GOOGLE_SERVICES_JSON(_BASE64) is required for release builds."
            exit 1
          fi

      - name: Validate production configuration
        env:
          SUPABASE_URL: ${{ secrets.CHRONOSPARK_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CHRONOSPARK_SUPABASE_ANON_KEY }}
          RECEIPT_ENDPOINT: ${{ secrets.CHRONOSPARK_RECEIPT_VERIFY_ENDPOINT }}
          AI_ENDPOINT: ${{ secrets.CHRONOSPARK_AI_PROXY_ENDPOINT }}
          DELETE_ENDPOINT: ${{ secrets.CHRONOSPARK_ACCOUNT_DELETE_ENDPOINT }}
          ANDROID_SHA256: ${{ secrets.CHRONOSPARK_ANDROID_SHA256_CERT }}
          IOS_TEAM_ID: ${{ secrets.CHRONOSPARK_IOS_TEAM_ID }}
        run: |
          [ -n "$SUPABASE_URL" ] || { echo "::error::CHRONOSPARK_SUPABASE_URL is required for release."; exit 1; }
          [ -n "$SUPABASE_ANON_KEY" ] || { echo "::error::CHRONOSPARK_SUPABASE_ANON_KEY is required for release."; exit 1; }
          [ -n "$RECEIPT_ENDPOINT" ] || { echo "::error::CHRONOSPARK_RECEIPT_VERIFY_ENDPOINT is required for release."; exit 1; }
          [ -n "$AI_ENDPOINT" ] || { echo "::error::CHRONOSPARK_AI_PROXY_ENDPOINT is required for release."; exit 1; }
          [ -n "$DELETE_ENDPOINT" ] || { echo "::error::CHRONOSPARK_ACCOUNT_DELETE_ENDPOINT is required for release."; exit 1; }
          [ -n "$ANDROID_SHA256" ] || { echo "::error::CHRONOSPARK_ANDROID_SHA256_CERT is required for release."; exit 1; }
          [ -n "$IOS_TEAM_ID" ] || { echo "::error::CHRONOSPARK_IOS_TEAM_ID is required for release."; exit 1; }
          echo "PROD_READINESS=true" >> "$GITHUB_ENV"

      - name: Build signed AAB
        run: >-
          flutter build appbundle --release
          --dart-define=CHRONOSPARK_APP_FLAVOR=prod
          --dart-define=CHRONOSPARK_ENFORCE_PROD_READINESS=${{ env.PROD_READINESS }}
          --dart-define=CHRONOSPARK_SUPABASE_URL=${{ secrets.CHRONOSPARK_SUPABASE_URL }}
          --dart-define=CHRONOSPARK_SUPABASE_ANON_KEY=${{ secrets.CHRONOSPARK_SUPABASE_ANON_KEY }}
          --dart-define=CHRONOSPARK_RECEIPT_VERIFY_ENDPOINT=${{ secrets.CHRONOSPARK_RECEIPT_VERIFY_ENDPOINT }}
          --dart-define=CHRONOSPARK_AI_PROXY_ENDPOINT=${{ secrets.CHRONOSPARK_AI_PROXY_ENDPOINT }}
          --dart-define=CHRONOSPARK_ACCOUNT_DELETE_ENDPOINT=${{ secrets.CHRONOSPARK_ACCOUNT_DELETE_ENDPOINT }}
          --dart-define=CHRONOSPARK_ANDROID_SHA256_CERT=${{ secrets.CHRONOSPARK_ANDROID_SHA256_CERT }}
          --dart-define=CHRONOSPARK_IOS_TEAM_ID=${{ secrets.CHRONOSPARK_IOS_TEAM_ID }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronospark-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/bundle/release/app-release.aab
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-pre') }}
